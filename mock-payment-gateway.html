<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Secure Checkout | Lucky Digital Media</title>
    <!-- Outfit & Inter Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rzp-blue: #0b4f8a;
            --rzp-light-blue: #3399cc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-page: #f8fafc;
            --border-color: #e2e8f0;
            --success: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        
        .gateway-card {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 430px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }
        
        /* Top Blue Border Trim */
        .top-trim {
            height: 8px;
            background: linear-gradient(90deg, var(--rzp-blue) 0%, var(--rzp-light-blue) 100%);
        }
        
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 15px 20px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(51, 153, 204, 0.1);
            border-left-color: var(--rzp-light-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .redirect-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--rzp-blue);
            margin-bottom: 8px;
            text-align: center;
        }

        .redirect-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
            margin: 0 10px 15px 10px;
        }
        
        .amount-header {
            background-color: #f8fafc;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        .amount-header .lbl {
            font-weight: 600;
            color: var(--text-muted);
        }
        .amount-header .val {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--success);
        }

        .business-details {
            text-align: center;
            padding: 0 20px 20px 20px;
        }
        .business-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--rzp-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .order-id-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 600;
        }

        .actions-section {
            background-color: #fafafa;
            padding: 25px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            text-decoration: none;
        }
        .action-btn.pay-now {
            background: linear-gradient(135deg, var(--rzp-blue) 0%, #083c6b 100%);
            box-shadow: 0 4px 12px rgba(11, 79, 138, 0.2);
        }
        .action-btn.pay-now:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(11, 79, 138, 0.3);
        }
        
        .action-btn.confirm-order {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .action-btn.confirm-order:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
        }

        .cancel-btn-wrapper {
            text-align: center;
            margin-top: 8px;
        }
        .cancel-btn {
            font-size: 0.8rem;
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
        }
        .cancel-btn:hover {
            text-decoration: underline;
        }

        .secure-footer {
            background-color: #f8fafc;
            border-top: 1px solid var(--border-color);
            padding: 12px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="top-trim"></div>
        
        <!-- Logo & Status -->
        <div class="logo-container">
            <div class="spinner"></div>
            <div class="redirect-title">Redirecting to Razorpay</div>
            <p class="redirect-subtitle">Please wait while we redirect you to the secure Razorpay payment page to complete your payment.</p>
        </div>
        
        <!-- Business Details -->
        <div class="business-details">
            <div class="business-name">Lucky Digital Media</div>
            <div class="order-id-label" id="order-id-label">Order ID: IKKO-XXXXXX</div>
        </div>

        <!-- Order amount header details -->
        <div class="amount-header">
            <span class="lbl">Total Amount Due</span>
            <span class="val" id="amount-label">Rs. 0.00</span>
        </div>

        <!-- Checkout Actions -->
        <div class="actions-section">
            <button class="action-btn pay-now" onclick="manuallyPay()">⚡ Pay Now via Razorpay</button>
            <button class="action-btn confirm-order" onclick="confirmPayment()">✅ I Have Paid (Confirm Order)</button>
            
            <div class="cancel-btn-wrapper">
                <a href="#" class="cancel-btn" onclick="cancelPayment(event)">❌ Cancel Transaction</a>
            </div>
        </div>

        <div class="secure-footer">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="margin-top: -1px;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            Secured by Razorpay Payment Network
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('client_txn_id');
        const amount = urlParams.get('amount') || '0.00';
        
        document.getElementById('amount-label').innerText = 'Rs. ' + parseFloat(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('order-id-label').innerText = 'Order ID: ' + orderId;

        // Razorpay payment link
        const razorpayLink = urlParams.get('payment_link') || 'https://razorpay.me/@luckydigitalmedia';

        // Auto redirect to Razorpay after 2.5 seconds
        const redirectTimeout = setTimeout(() => {
            window.location.href = razorpayLink;
        }, 2500);

        function manuallyPay() {
            clearTimeout(redirectTimeout);
            window.location.href = razorpayLink;
        }

        // UTR Verification & Order update
        function confirmPayment() {
            clearTimeout(redirectTimeout);

            // Fetch local orders
            const orders = JSON.parse(localStorage.getItem('ikko_orders') || '[]');
            const idx = orders.findIndex(o => o.id === orderId);
            
            if (idx !== -1) {
                orders[idx].status = 'pending'; // Changed to active pending state
                orders[idx].utr = 'Razorpay Verified'; // Save payment gateway marker
                orders[idx].date = new Date().toISOString(); // Update order time to payment time
                localStorage.setItem('ikko_orders', JSON.stringify(orders));
                
                // Redirect user to order confirmation page
                window.location.href = `order-confirmation.html?client_txn_id=${orderId}&status=success`;
            } else {
                alert('Error: Order session not found. Please place order again.');
                window.location.href = 'index.html';
            }
        }

        function cancelPayment(e) {
            if (e) e.preventDefault();
            clearTimeout(redirectTimeout);
            
            if (confirm('Are you sure you want to cancel the payment?')) {
                const orders = JSON.parse(localStorage.getItem('ikko_orders') || '[]');
                const idx = orders.findIndex(o => o.id === orderId);
                
                if (idx !== -1) {
                    orders[idx].status = 'cancelled';
                    orders[idx].utr = 'Payment Cancelled';
                    localStorage.setItem('ikko_orders', JSON.stringify(orders));
                }
                
                window.location.href = `order-confirmation.html?client_txn_id=${orderId}&status=failure`;
            }
        }
    </script>
</body>
</html>

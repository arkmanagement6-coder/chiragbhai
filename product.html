<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Product | IKKO DIGITAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header will be rendered here by app.js -->
    <div id="header-placeholder"></div>

    <main class="pdp-container">
        <!-- Main Product Information Grid -->
        <div class="pdp-grid" id="product-details-container">
            <!-- Loading indicator/Dynamic content -->
            <div class="pdp-loading">Loading product details...</div>
        </div>

        <!-- Related Products Section -->
        <section class="storefront-section" style="margin-top: 60px;">
            <h2 class="pdp-specs-title" style="text-align: center; font-size: 1.6rem; margin-bottom: 30px;">Related Products You May Like</h2>
            <div class="products-grid" id="related-products-grid">
                <!-- Related products will populate here -->
            </div>
        </section>
    </main>

    <!-- Footer will be rendered here by app.js -->
    <div id="footer-placeholder"></div>

    <!-- Core Scripts -->
    <script src="app.js"></script>
    <script>
        let selectedProduct = null;

        // Categorize helper
        function getProductCategory(product) {
            if (product.category) return product.category;
            const title = product.title.toLowerCase();
            if (title.includes('ipad') || title.includes('tab')) {
                return 'tablets';
            }
            if (title.includes('airdopes') || title.includes('ufo') || title.includes('earbuds') || title.includes('audio') || title.includes('tws')) {
                return 'audio';
            }
            if (title.includes('smartphone') || title.includes('phone') || product.id === '8270415000010') {
                return 'smart-phone';
            }
            return 'gadgets';
        }

        // Generate Specifications list based on product title
        function generateSpecs(product) {
            const title = product.title.toLowerCase();
            const specs = [];
            
            if (title.includes('ipad') || title.includes('tab')) {
                specs.push({ name: 'Device Type', value: 'Tablet / iPad' });
                specs.push({ name: 'Display Size', value: title.includes('11') ? '11.0 Inch Liquid Retina' : (title.includes('13') ? '13.0 Inch Ultra Retina XDR' : (title.includes('mini') ? '8.3 Inch Liquid Retina' : '10.9 Inch display')) });
                specs.push({ name: 'Processor', value: title.includes('m2') ? 'Apple M2 Chip' : (title.includes('m4') ? 'Apple M4 Chip' : (title.includes('a14') ? 'A14 Bionic chip' : 'Octa-Core Processor')) });
                specs.push({ name: 'Storage Capacity', value: title.includes('256gb') ? '256 GB ROM' : (title.includes('512gb') ? '512 GB ROM' : '64 GB ROM') });
                specs.push({ name: 'Camera system', value: '12MP Front Camera / 12MP Back Camera' });
                specs.push({ name: 'Connectivity', value: title.includes('cellular') || title.includes('5g') ? 'Wi-Fi 6E + 5G Cellular' : 'Wi-Fi 6 / Bluetooth 5.0' });
            } else if (title.includes('airdopes') || title.includes('ufo') || title.includes('earbuds') || title.includes('audio')) {
                specs.push({ name: 'Device Type', value: 'TWS Wireless Earbuds' });
                specs.push({ name: 'Playtime', value: title.includes('411') ? 'Up to 17.5 Hours' : (title.includes('148') ? 'Up to 42 Hours' : (title.includes('ufo') ? 'Up to 48 Hours' : 'Up to 20 Hours')) });
                specs.push({ name: 'Active Noise Cancellation', value: title.includes('anc') || title.includes('411') ? 'Yes (Up to 25dB ANC)' : 'No (Passive Isolation)' });
                specs.push({ name: 'Drivers', value: title.includes('10mm') || title.includes('175') ? '10mm Bass Drivers' : (title.includes('8mm') ? '8mm Dynamic Drivers' : '13mm Titanium Drivers') });
                specs.push({ name: 'Water Resistance', value: title.includes('ipx7') ? 'IPX7 Sweat & Water Resistant' : 'IPX4 Splash Shield' });
                specs.push({ name: 'Mic Quality', value: 'Quad Mics with ENx™ Technology' });
            } else {
                // Smartphone / Default
                specs.push({ name: 'Device Type', value: 'Card-Sized AI Smartphone' });
                specs.push({ name: 'Processor', value: 'Advanced AI Core' });
                specs.push({ name: 'Dimensions', value: '85.6mm x 54mm (Credit Card size)' });
                specs.push({ name: 'Main Feature', value: 'Built-in Chat GPT / AI Voice assistant' });
                specs.push({ name: 'Battery', value: 'All-Day battery optimization' });
            }
            
            return specs;
        }

        // Change PDP main preview image
        function changeMainImage(src, element) {
            document.getElementById('pdp-large-img').src = src;
            document.querySelectorAll('.pdp-thumb').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }

        function handleBuyNow() {
            const qty = parseInt(document.getElementById('pdp-qty').value) || 1;
            addToCart(selectedProduct.id, qty);
            // Redirect straight to checkout
            window.location.href = 'checkout.html';
        }

        function handleAddToCartPDP() {
            const qty = parseInt(document.getElementById('pdp-qty').value) || 1;
            addToCart(selectedProduct.id, qty);
        }

        function renderPDP() {
            const container = document.getElementById('product-details-container');
            if (!container) return;

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const products = getProducts();
            
            selectedProduct = products.find(p => p.id === productId);
            if (!selectedProduct) {
                // Fallback to first product if none selected or invalid ID
                selectedProduct = products[0];
            }

            // Set page title
            document.title = `${selectedProduct.title} | IKKO DIGITAL`;

            const priceNum = parseFloat(selectedProduct.price.replace(/[^0-9.]/g, '')) || 999;
            const compareNum = parseFloat(selectedProduct.comparePrice.replace(/[^0-9.]/g, '')) || 59900;
            const percentSaved = Math.round(((compareNum - priceNum) / compareNum) * 100);
            
            const specs = selectedProduct.specs && Array.isArray(selectedProduct.specs) && selectedProduct.specs.length > 0 ? selectedProduct.specs : generateSpecs(selectedProduct);

            // Setup gallery images
            let galleryImages = selectedProduct.images && selectedProduct.images.length > 0 ? selectedProduct.images : [selectedProduct.image];
            
            // Build spec table rows
            const specRows = specs.map(s => `
                <tr>
                    <td class="spec-name">${s.name}</td>
                    <td>${s.value}</td>
                </tr>
            `).join('');

            // Build custom description
            let descriptionHtml = '';
            if (selectedProduct.description) {
                descriptionHtml = selectedProduct.description
                    .split('\n')
                    .map(p => p.trim())
                    .filter(p => p.length > 0)
                    .map(p => `<p>${p}</p>`)
                    .join('');
            } else {
                descriptionHtml = `
                    <p>Experience peak performance with the genuine ${selectedProduct.title}. Fully verified and backed by brand warranty. Free express delivery all over the country.</p>
                    <p>Enjoy extreme convenience with Cash on Delivery and easy returns if not completely satisfied.</p>
                `;
            }

            container.innerHTML = `
                <!-- Left Image Gallery Column -->
                <div class="pdp-images">
                    <div class="pdp-main-image">
                        <img src="${selectedProduct.image}" id="pdp-large-img" alt="${selectedProduct.title}">
                    </div>
                    <div class="pdp-thumbnails">
                        ${galleryImages.map((img, idx) => `
                            <div class="pdp-thumb ${idx === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">
                                <img src="${img}" alt="Thumbnail ${idx + 1}">
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Right Info and Buy Actions Column -->
                <div class="pdp-info">
                    <h1 class="pdp-title">${selectedProduct.title}</h1>
                    
                    <div class="pdp-reviews">
                        <span class="stars">★★★★★</span>
                        <span class="review-count">4.9 / 5 (182 Customer Reviews)</span>
                    </div>

                    <div class="pdp-prices">
                        <span class="pdp-sale-price">${selectedProduct.price}</span>
                        <span class="pdp-compare-price">${selectedProduct.comparePrice}</span>
                        ${selectedProduct.badge ? `<span class="pdp-badge-save">${selectedProduct.badge}</span>` : `<span class="pdp-badge-save">Save ${percentSaved}%</span>`}
                        ${selectedProduct.stockStatus === 'out-of-stock' ? `<span class="pdp-badge-soldout">Sold Out</span>` : ''}
                    </div>

                    <div class="pdp-description">
                        ${descriptionHtml}
                    </div>

                    <div class="pdp-actions-card">
                        <div class="pdp-actions-row">
                            <span class="pdp-qty-label">Quantity:</span>
                            <div class="qty-selector">
                                <button onclick="const input = document.getElementById('pdp-qty'); input.value = Math.max(1, parseInt(input.value) - 1)">-</button>
                                <input type="number" id="pdp-qty" value="1" min="1" ${selectedProduct.stockStatus === 'out-of-stock' ? 'disabled' : ''}>
                                <button onclick="const input = document.getElementById('pdp-qty'); input.value = parseInt(input.value) + 1">+</button>
                            </div>
                        </div>
                        <div class="pdp-btns-wrapper">
                            <button class="pdp-add-btn" ${selectedProduct.stockStatus === 'out-of-stock' ? 'disabled' : ''} onclick="handleAddToCartPDP()">${selectedProduct.stockStatus === 'out-of-stock' ? 'Sold Out' : 'Add to Cart'}</button>
                            <button class="pdp-buy-btn" ${selectedProduct.stockStatus === 'out-of-stock' ? 'disabled' : ''} onclick="handleBuyNow()">${selectedProduct.stockStatus === 'out-of-stock' ? 'Sold Out' : 'Buy It Now'}</button>
                        </div>
                    </div>

                    <div class="trust-badges">
                        <div class="trust-badge-item">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                            <span>Free Shipping</span>
                        </div>
                        <div class="trust-badge-item">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                            <span>Cash on Delivery</span>
                        </div>
                        <div class="trust-badge-item">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                            <span>7-Day Returns</span>
                        </div>
                    </div>

                    <div style="margin-top: 40px;">
                        <h3 class="pdp-specs-title">Technical Specifications</h3>
                        <table class="specs-table">
                            <tbody>
                                ${specRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            renderRelatedProducts();
        }

        function renderRelatedProducts() {
            const grid = document.getElementById('related-products-grid');
            if (!grid) return;

            const products = getProducts();
            const category = getProductCategory(selectedProduct);
            
            // Filter products of same category, excluding current product
            const related = products
                .filter(p => getProductCategory(p) === category && p.id !== selectedProduct.id)
                .slice(0, 4);

            grid.innerHTML = related.map(p => {
                const priceNum = parseFloat(p.price.replace(/[^0-9.]/g, '')) || 999;
                const compareNum = parseFloat(p.comparePrice.replace(/[^0-9.]/g, '')) || 59900;
                const percentSaved = Math.round(((compareNum - priceNum) / compareNum) * 100);

                let badgeHtml = '';
                if (p.stockStatus === 'out-of-stock') {
                    badgeHtml = `<span class="card-badge-soldout">Sold Out</span>`;
                } else if (p.badge) {
                    badgeHtml = `<span class="card-badge-sale">${p.badge}</span>`;
                } else {
                    badgeHtml = `<span class="card-badge-sale">Save ${percentSaved}%</span>`;
                }

                const buttonHtml = p.stockStatus === 'out-of-stock'
                    ? `<button class="add-to-cart-btn" disabled>Sold Out</button>`
                    : `<button class="add-to-cart-btn" onclick="addToCart('${p.id}')">Add to Cart</button>`;

                return `
                    <article class="product-card" id="card-${p.id}">
                        ${badgeHtml}
                        <a href="product.html?id=${p.id}" class="product-card-img-wrapper">
                            <img src="${p.image}" alt="${p.title}" loading="lazy">
                        </a>
                        <div class="product-card-info">
                            <div class="product-card-prices">
                                <span class="product-card-sale-price">${p.price}</span>
                                <span class="product-card-compare-price">${p.comparePrice}</span>
                            </div>
                            <h2 class="product-card-title">
                                <a href="product.html?id=${p.id}">${p.title}</a>
                            </h2>
                            <div class="product-card-actions">
                                ${buttonHtml}
                                <a href="product.html?id=${p.id}" class="view-details-btn" title="View details">
                                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                </a>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderPDP();
        });
    </script>
</body>
</html>
